<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Sun Profile Viewer</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; margin: 16px; background: linear-gradient(180deg, #eef2ff 0%, #f8fbff 100%); color: #0f172a; }
    h1 { font-size: 1.35rem; margin-bottom: 0.5rem; color: #0f172a; }
    .panel { background: white; border-radius: 20px; padding: 18px; border: 1px solid #e2e8f0; box-shadow: 0 20px 40px rgba(15,23,42,0.08); margin-bottom: 20px; }
    label { display: block; margin-top: 12px; font-size: 0.95rem; color: #334155; }
    input, button { width: 100%; padding: 12px 14px; margin-top: 8px; border: 1px solid #cbd5e1; border-radius: 14px; font-size: 1rem; }
    input:focus, button:focus { outline: none; box-shadow: 0 0 0 4px rgba(59,130,246,0.15); }
    button { background: #2563eb; color: white; border: none; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    canvas { width: 100%; max-width: 1000px; border-radius: 18px; border: 1px solid #dbeafe; background: #ffffff; box-shadow: 0 18px 40px rgba(15,23,42,0.08); }
    .note { font-size: 0.9rem; color: #475569; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="panel">
    <label>
      Latitude
      <input id="latitude" type="number" step="0.000001" value="39.06" />
    </label>
    <label>
      Longitude
      <input id="longitude" type="number" step="0.000001" value="22.43" />
    </label>
    <label>
      Date
      <input id="date" type="date" />
    </label>
    <label>
      Face azimuth (0=N, 90=E, 180=S, 270=W)
      <input id="faceAzimuth" type="number" step="1" value="180" />
    </label>
    <button id="renderBtn">Render Sun Profile</button>
    <div class="note">Local time is approximated from longitude for App Inventor compatibility.</div>
  </div>

  <div class="panel">
    <canvas id="chart" width="1000" height="460"></canvas>
    <div class="note" id="infoText"></div>
  </div>

  <script>
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');

    const toRadians = deg => deg * Math.PI / 180;
    const toDegrees = rad => rad * 180 / Math.PI;

    function dayOfYear(date) {
      const start = new Date(Date.UTC(date.getUTCFullYear(), 0, 0));
      const diff = date - start;
      return Math.floor(diff / 86400000);
    }

    function approximateTimezoneOffset(longitude) {
      const offset = Math.round(longitude / 15);
      return Math.max(-12, Math.min(14, offset));
    }

    function solarPosition(dtUtc, latitude, longitude, localOffsetHours) {
      const localMs = dtUtc.getTime() + localOffsetHours * 3600 * 1000;
      const local = new Date(localMs);

      const n = dayOfYear(local);
      const utcHour = dtUtc.getUTCHours() + dtUtc.getUTCMinutes()/60 + dtUtc.getUTCSeconds()/3600;
      const gamma = 2 * Math.PI / 365 * (n - 1 + (utcHour - 12) / 24);

      const eqtime = 229.18 * (0.000075 + 0.001868 * Math.cos(gamma) - 0.032077 * Math.sin(gamma)
        - 0.014615 * Math.cos(2*gamma) - 0.040849 * Math.sin(2*gamma));

      const decl = 0.006918 - 0.399912 * Math.cos(gamma) + 0.070257 * Math.sin(gamma)
        - 0.006758 * Math.cos(2*gamma) + 0.000907 * Math.sin(2*gamma)
        - 0.002697 * Math.cos(3*gamma) + 0.00148 * Math.sin(3*gamma);

      const localHour = local.getUTCHours() + local.getUTCMinutes()/60 + local.getUTCSeconds()/3600;
      const timeOffset = eqtime + 4 * longitude - 60 * localOffsetHours;
      const tst = localHour * 60 + timeOffset;
      const hourAngle = tst / 4 - 180;

      const latRad = toRadians(latitude);
      const haRad = toRadians(hourAngle);

      const cosZenith = Math.max(-1, Math.min(1,
        Math.sin(latRad) * Math.sin(decl) +
        Math.cos(latRad) * Math.cos(decl) * Math.cos(haRad)
      ));

      const zenith = Math.acos(cosZenith);
      const elevation = 90 - toDegrees(zenith);

      const sinAz = -(Math.sin(haRad) * Math.cos(decl)) / Math.sin(zenith);
      const cosAz = (Math.sin(decl) - Math.sin(latRad) * Math.cos(zenith)) /
        (Math.cos(latRad) * Math.sin(zenith));
      const azimuth = (toDegrees(Math.atan2(sinAz, cosAz)) + 360) % 360;

      return { elevation, azimuth };
    }

    function illuminationStrength(sunAz, sunEl, faceAz) {
      if (sunEl <= 0) return 0;
      const azRad = toRadians(sunAz);
      const elRad = toRadians(sunEl);
      const faceRad = toRadians(faceAz);

      const sx = Math.cos(elRad) * Math.sin(azRad);
      const sy = Math.cos(elRad) * Math.cos(azRad);
      const sz = Math.sin(elRad);

      const nx = Math.sin(faceRad);
      const ny = Math.cos(faceRad);
      const nz = 0;

      return Math.max(0, sx*nx + sy*ny + sz*nz);
    }

    function normalize(arr) {
      const max = Math.max(...arr);
      return max === 0 ? arr : arr.map(v => v / max);
    }

    function formatTime(date) {
      const hours = date.getHours().toString().padStart(2, '0');
      const minutes = date.getMinutes().toString().padStart(2, '0');
      return `${hours}:${minutes}`;
    }

    function createHatchPattern(color) {
      const patternCanvas = document.createElement('canvas');
      patternCanvas.width = 8;
      patternCanvas.height = 8;
      const pc = patternCanvas.getContext('2d');
      pc.strokeStyle = color;
      pc.lineWidth = 1;
      pc.beginPath();
      pc.moveTo(0, 8);
      pc.lineTo(8, 0);
      pc.stroke();
      return ctx.createPattern(patternCanvas, 'repeat');
    }

    function drawChart(times, elevation, illumination, tzLabel) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const margin = 60;
      const width = canvas.width - margin * 2;
      const height = canvas.height - margin * 2;
      const count = times.length;

      ctx.strokeStyle = 'rgba(148,163,184,0.3)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= 6; i++) {
        const y = margin + i * (height / 6);
        ctx.beginPath();
        ctx.moveTo(margin, y);
        ctx.lineTo(canvas.width - margin, y);
        ctx.stroke();
      }
      for (let i = 0; i <= 6; i++) {
        const x = margin + i * (width / 6);
        ctx.beginPath();
        ctx.moveTo(x, margin);
        ctx.lineTo(x, canvas.height - margin);
        ctx.stroke();
      }

      ctx.font = '12px Inter, Arial';
      ctx.fillStyle = '#0f172a';
      ctx.fillText('Local time: ' + tzLabel, margin, 28);
      ctx.fillText('Sun elevation (blue)', margin, 46);
      ctx.fillText('Face illumination (orange)', margin, 64);

      const pattern = createHatchPattern('rgba(59, 130, 246, 0.30)');
      ctx.fillStyle = pattern;
      for (let index = 0; index < count - 1; index++) {
        const x0 = margin + (index / (count - 1)) * width;
        const x1 = margin + ((index + 1) / (count - 1)) * width;
        const y0a = canvas.height - margin - elevation[index] * height;
        const y1a = canvas.height - margin - elevation[index + 1] * height;
        const y0b = canvas.height - margin - illumination[index] * height;
        const y1b = canvas.height - margin - illumination[index + 1] * height;
        ctx.beginPath();
        ctx.moveTo(x0, y0a);
        ctx.lineTo(x1, y1a);
        ctx.lineTo(x1, y1b);
        ctx.lineTo(x0, y0b);
        ctx.closePath();
        ctx.fill();
      }

      ctx.save();
      ctx.shadowColor = 'rgba(37,99,235,0.2)';
      ctx.shadowBlur = 14;
      ctx.strokeStyle = '#2563eb';
      ctx.lineWidth = 3.5;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.beginPath();
      elevation.forEach((value, index) => {
        const x = margin + (index / (count - 1)) * width;
        const y = canvas.height - margin - value * height;
        if (index === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.restore();

      ctx.strokeStyle = '#fb923c';
      ctx.lineWidth = 3;
      ctx.setLineDash([10, 6]);
      ctx.beginPath();
      illumination.forEach((value, index) => {
        const x = margin + (index / (count - 1)) * width;
        const y = canvas.height - margin - value * height;
        if (index === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.fillStyle = '#000';
      ctx.font = '12px Arial';
      const labelCount = Math.min(6, Math.max(1, count - 1));
      for (let i = 0; i <= labelCount; i++) {
        const idx = Math.round((i / labelCount) * (count - 1));
        const x = margin + (idx / Math.max(1, count - 1)) * width;
        const label = formatTime(times[idx]);
        ctx.fillText(label, x - 18, canvas.height - margin + 18);
      }

      ctx.fillText('0.0', 8, canvas.height - margin);
      ctx.fillText('1.0', 12, margin + 4);

      ctx.strokeStyle = '#111';
      ctx.lineWidth = 2;
      ctx.strokeRect(margin, margin, width, height);

      ctx.fillStyle = '#2f6ff4';
      ctx.fillRect(canvas.width - margin - 220, margin + 10, 14, 14);
      ctx.fillStyle = '#000';
      ctx.fillText('Sun elevation', canvas.width - margin - 198, margin + 22);
      ctx.fillStyle = '#f47f2f';
      ctx.fillRect(canvas.width - margin - 220, margin + 34, 14, 14);
      ctx.fillStyle = '#000';
      ctx.fillText('Wall illumination', canvas.width - margin - 198, margin + 46);
    }

    function render() {
      const lat = parseFloat(document.getElementById('latitude').value);
      const lon = parseFloat(document.getElementById('longitude').value);
      const dateValue = document.getElementById('date').value;
      const faceAzimuth = parseFloat(document.getElementById('faceAzimuth').value);

      if (Number.isNaN(lat) || Number.isNaN(lon) || !dateValue) return;

      const localOffset = approximateTimezoneOffset(lon);
      const tzLabel = 'UTC' + (localOffset >= 0 ? '+'+localOffset : localOffset);
      const [year, month, day] = dateValue.split('-').map(Number);
      const startLocal = Date.UTC(year, month-1, day, 0, 0) - localOffset * 3600 * 1000;
      const points = [];
      const stepMinutes = 5;
      const steps = 24 * 60 / stepMinutes;

      for (let i = 0; i <= steps; i++) {
        const currentUtc = new Date(startLocal + i * stepMinutes * 60000);
        const pos = solarPosition(currentUtc, lat, lon, localOffset);
        const illum = illuminationStrength(pos.azimuth, pos.elevation, faceAzimuth);
        points.push({ time: new Date(currentUtc.getTime() + localOffset * 3600 * 1000), elevation: pos.elevation, illumination: illum });
      }

      const normalizedElevation = normalize(points.map(p => Math.max(0, p.elevation)));
      const normalizedIllumination = normalize(points.map(p => p.illumination));
      drawChart(points.map(p => p.time), normalizedElevation, normalizedIllumination, tzLabel);

      document.getElementById('infoText').textContent =
        `Latitude=${lat.toFixed(6)}, Longitude=${lon.toFixed(6)}, az=${faceAzimuth}°, local timezone ≈ ${tzLabel}`;
    }

    const dateInput = document.getElementById('date');
    dateInput.value = new Date().toISOString().slice(0, 10);

    document.getElementById('renderBtn').addEventListener('click', render);
    render();
  </script>
</body>
</html>
